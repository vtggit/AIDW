# VTG control record — compliance-gate corpus (controls-not-law; OSCAL-inspired v1)
id: 800-171-3.3.1
family: Audit & Accountability
title: Audit CUI access and mutation
source:
  framework: NIST SP 800-171 rev 2
  section: "3.3.1"
  note: citation only — the statement below is the company-ratified operative rule
cmmc_level: 2
statement: >
  Every component that stores or processes CUI must produce retained audit
  records sufficient to reconstruct who accessed or changed what, and when.
  A component with no audit trail on CUI operations may not hold CUI.
applicability_tags: [cui, adoption]
severity: high
version: 1
status: ratified
ratified_by: operator (interim ratifier — theoretical-company phase)
ratified_date: "2026-07-16"
