# CodeAgent gate — daily re-validation (contract-v2 Phase 4a.4).
#
# A governance veto or decision change happens on the ISSUE, with no push to the
# linked PR — so the on-push merge-gate's last green run would still let the PR
# merge. This scheduled job re-checks the issue-side invariants for every open
# contract-bearing PR and posts a "codeagent-contract-revalidate" check-run on its
# head SHA, flipping it red without a push. Make that check ALSO required (see
# docs/branch-protection.md) so a late veto blocks merge.
name: CodeAgent gate — daily re-validation

on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read
  issues: read

jobs:
  revalidate:
    name: Re-validate open contract PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Re-validate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ca_gate/revalidate.py
