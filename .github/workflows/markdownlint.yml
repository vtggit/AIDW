name: Markdown Lint

on:
  pull_request:
    branches: [main, master]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown
        run: npx markdownlint-cli2 "**/*.md" "!node_modules/**"
