server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle /app/ prefix — some test scripts access the app at /app/index.html.
    # Rewrite strips the /app/ prefix so the same files are served from root.
    location /app/ {
        rewrite ^/app/(.*)$ /$1 last;
    }

    # Serve the SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the backend container.
    # This covers /api/*, including /api/health and /api/auth/config.
    location /api/ {
        proxy_pass http://backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
