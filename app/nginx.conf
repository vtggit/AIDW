server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle /app/ prefix — some test scripts access the app at /app/index.html.
    # Rewrite strips the /app/ prefix so the same files are served from root.
    location /app/ {
        rewrite ^/app/(.*)$ /$1 last;
    }

    # Serve the SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the backend container.
    # This covers /api/*, including /api/health and /api/auth/config.
    location /api/ {
        proxy_pass http://backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy the AI assistant (Phase 1) to the co-located Assistant service, so the
    # panel loads same-origin (no CORS, reuses the app's token). The upstream is a
    # docker service name on the shared network — no host/IP in the repo. If the
    # assistant is not deployed, this returns 502/404 and the panel simply won't load.
    location /assistant/ {
        proxy_pass http://aidw-assistant:9020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Server-sent events: stream tokens through without buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
