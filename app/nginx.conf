server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Handle /app/ prefix — some test scripts access the app at /app/index.html.
    # Rewrite strips the /app/ prefix so the same files are served from root.
    location /app/ {
        rewrite ^/app/(.*)$ /$1 last;
    }

    # Serve the SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the backend container.
    # This covers /api/*, including /api/health and /api/auth/config.
    location /api/ {
        proxy_pass http://backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy the AI assistant (Phase 1) to the co-located Assistant service, so the
    # panel loads same-origin (no CORS, reuses the app's token). The upstream is a
    # docker service name on the shared network — no host/IP in the repo.
    #
    # The assistant is OPTIONAL: it is a separate compose file and may be absent.
    # A literal `proxy_pass http://name` would make nginx resolve `name` at BOOT and
    # abort startup (host not found in upstream) — taking the whole app down. Using
    # the docker embedded DNS resolver + a variable upstream defers resolution to
    # request time, so a missing assistant degrades to a harmless 502 and the panel
    # simply does not load. (The variable form does not auto-append the location URI,
    # so $request_uri preserves the /assistant/ prefix the FastAPI routes expect.)
    location /assistant/ {
        resolver 127.0.0.11 valid=10s;
        set $assistant_upstream http://aidw-assistant:9020;
        proxy_pass $assistant_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Server-sent events: stream tokens through without buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
