<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/warehouse.css">
    <link rel="stylesheet" href="vendor/bpmn-js/assets/diagram-js.css">
    <link rel="stylesheet" href="vendor/bpmn-js/assets/bpmn-js.css">
    <link rel="stylesheet" href="vendor/bpmn-js/assets/bpmn-font/css/bpmn.css">
    <link rel="stylesheet" href="vendor/bpmn-js/assets/bpmn-font/css/bpmn-embedded.css">
    <link rel="stylesheet" href="css/workflows.css">
</head>
<body>
    <header id="auth-status"></header>

    <section class="wh-panel" id="source-form">
        <h2>Data Sources</h2>
        <input type="text" id="src-name" placeholder="Source name">
        <input type="text" id="src-endpoint" placeholder="Endpoint URL">
        <input type="text" id="src-version" placeholder="Version">
        <button id="src-submit">Add Source</button>
    </section>

    <section class="wh-panel" id="sources"></section>

    <section class="wh-panel" id="inbox-count"></section>
    <section class="wh-panel" id="inbox"></section>

    <section class="wh-panel" id="dashboards"></section>

    <section class="wh-panel" id="pii-count"></section>
    <section class="wh-panel" id="pii-inbox"></section>

    <div id="toast"></div>

    <section class="wh-panel">
        <h2>Workflow Authoring</h2>
        <button id="bpmn-new">New Diagram</button>
        <button id="bpmn-open">Open Diagram</button>
        <button id="bpmn-download">Download XML</button>
        <button id="bpmn-download-svg">Download SVG</button>
        <div id="bpmn-canvas"></div>
    </section>

    <section class="wh-panel">
        <h2>Process wizard</h2>

        <div id="wizard-notice" style="display:none;"></div>
        <div id="wizard-toast" style="display:none;"></div>

        <fieldset>
            <legend>Definitions</legend>
            <input type="text" id="wizard-def-name" placeholder="Definition name">
            <input type="text" id="wizard-def-key" placeholder="Definition key">
            <button id="wizard-create-def-btn">Create Definition</button>
            <div id="wizard-definitions" data-testid="wizard-definitions"></div>
        </fieldset>

        <fieldset>
            <legend>Steps</legend>
            <input type="text" id="wizard-step-name" placeholder="Step name">
            <input type="text" id="wizard-step-key" placeholder="Step key">
            <input type="number" id="wizard-step-ordinal" placeholder="Ordinal">
            <select id="wizard-step-type">
                <option value="start">Start</option>
                <option value="end">End</option>
                <option value="user">User Task</option>
                <option value="service">Service Task</option>
                <option value="gateway">Gateway</option>
            </select>
            <input type="text" id="wizard-step-service-impl" placeholder="Service implementation">
            <input type="text" id="wizard-step-groups" placeholder="Candidate groups">
            <input type="text" id="wizard-step-form-key" placeholder="Form key">
            <button id="wizard-create-step-btn">Create Step</button>
            <div id="wizard-steps" data-testid="wizard-steps"></div>
        </fieldset>

        <fieldset>
            <legend>Flows</legend>
            <input type="text" id="wizard-flow-name" placeholder="Flow name">
            <input type="text" id="wizard-flow-key" placeholder="Flow key">
            <select id="wizard-flow-source"></select>
            <select id="wizard-flow-target"></select>
            <input type="text" id="wizard-flow-condition" placeholder="Condition expression">
            <label><input type="checkbox" id="wizard-flow-default"> Default flow</label>
            <button id="wizard-create-flow-btn">Create Flow</button>
            <div id="wizard-flows" data-testid="wizard-flows"></div>
        </fieldset>

        <fieldset>
            <legend>Generate</legend>
            <button id="wizard-generate">Generate Diagram</button>
            <button id="wizard-download-xml" disabled>Download XML</button>
            <button id="wizard-download-svg" disabled>Download SVG</button>
            <div id="wizard-svg" data-testid="wizard-svg"></div>
        </fieldset>
    </section>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/warehouse.js"></script>
    <script src="js/sources.js"></script>
    <script src="vendor/bpmn-js/bpmn-modeler.production.min.js"></script>
    <script src="js/workflows.js"></script>
    <script src="js/wizard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Warehouse.init();
            Sources.init();
            Workflows.init();
            Wizard.init();
        });
    </script>
</body>
</html>
