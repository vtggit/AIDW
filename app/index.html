<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIDW — AI Data Warehouse</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/warehouse.css" />
</head>
<body>
  <header class="wh-header">
    <div class="wh-brand">AIDW <span>· AI Data Warehouse</span></div>
    <a class="wh-nav btn btn-secondary" href="studio.html" data-testid="nav-studio">Configure</a>
    <div class="wh-auth" id="auth-status" data-testid="auth-status">…</div>
  </header>

  <main class="wh-main">
    <section class="wh-panel">
      <div class="wh-panel-head">
        <h2>Dashboards</h2>
        <p class="wh-sub">Accepted suggestions land here as dashboard items. Click a card to
        open the data behind it. Configure sources, suggestions and processes in the Studio.</p>
      </div>
      <div id="dashboards" class="wh-dashboards" data-testid="dashboards"></div>
    </section>

    <section class="wh-panel dd-panel" id="drilldown" data-testid="drilldown" hidden>
      <button id="drilldown-close" class="btn btn-secondary" type="button">✕ Close</button>
      <div id="drilldown-body" data-testid="drilldown-body"></div>
    </section>
  </main>

  <div id="toast" class="wh-toast" data-testid="toast" hidden></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/warehouse.js"></script>
  <script src="js/drilldown.js"></script>
  <script>window.addEventListener('DOMContentLoaded', function () { Warehouse.init(); Drilldown.init(); });</script>
</body>
</html>
